upstream summarizer_backend {
    server app:8787;
    keepalive 32;
}

# HTTP entrypoint. For HTTPS in production, enable conf.d/ssl.conf (see ssl.conf.example).
server {
    listen 80;
    server_name _;

    # Slightly above backend MAX_FILE_BYTES (25 MB default).
    client_max_body_size 26m;

    location /health {
        proxy_pass http://summarizer_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    location / {
        proxy_pass http://summarizer_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # OCR + large document summarization can take several minutes.
        proxy_connect_timeout 60s;
        proxy_send_timeout 900s;
        proxy_read_timeout 900s;
        send_timeout 900s;
    }
}
